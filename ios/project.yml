name: Slide
options:
  bundleIdPrefix: app.exla.slide
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    minVersion: "2.0.0"
    maxVersion: "3.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    minVersion: "11.0.0"
    maxVersion: "12.0.0"

targets:
  Slide:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.exla.slide
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "24"
        # Phone-only. Pinned on the target so xcodegen can't fall back to "1,2".
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Knock Knock
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        # Phone-only, iPhone family only. No iPad orientation keys so the build
        # doesn't declare iPad support (which would force iPad screenshots).
        # Landscape is declared but locked to portrait at runtime except during
        # an active call (AppDelegate.supportedInterfaceOrientationsFor).
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Slide needs camera access for video calls."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Slide needs microphone access for calls."
        INFOPLIST_KEY_NSContactsUsageDescription: "Slide uses your contacts to find friends already on Slide."
        INFOPLIST_KEY_UIBackgroundModes: "audio voip remote-notification"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
      configs:
        # Push Notifications capability via the entitlements file. APNs env is
        # "development" for Debug and "production" for Release/TestFlight. The
        # App ID (app.exla.slide) has Push enabled (enable_push_capability lane).
        Debug:
          CODE_SIGN_ENTITLEMENTS: Slide.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: SlideRelease.entitlements
          # Manual signing pinned to the APP TARGET ONLY (SPM packages like
          # Firebase/GoogleUtilities reject manual profiles — must stay automatic).
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "app.exla.slide AppStore"
    info:
      path: Generated-Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - app-1-561354442144-ios-898901de87c419eec650c5
    dependencies:
      - package: LiveKit
        product: LiveKit
      - package: Firebase
        product: FirebaseAuth

schemes:
  Slide:
    build:
      targets:
        Slide: all
    run:
      config: Debug
    archive:
      config: Release
