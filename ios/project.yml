name: Slide
options:
  bundleIdPrefix: app.exla.slide
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    minVersion: "120.0.0"
    maxVersion: "200.0.0"

targets:
  Slide:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.exla.slide
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Slide
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        # Phone-only: portrait, iPhone family only. No iPad orientation keys so the
        # build doesn't declare iPad support (which would force iPad screenshots).
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Slide needs camera access for video calls."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Slide needs microphone access for calls."
        INFOPLIST_KEY_NSContactsUsageDescription: "Slide uses your contacts to find friends already on Slide."
        INFOPLIST_KEY_UIBackgroundModes: "audio voip remote-notification"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    dependencies:
      - package: WebRTC
        product: WebRTC

schemes:
  Slide:
    build:
      targets:
        Slide: all
    run:
      config: Debug
    archive:
      config: Release
