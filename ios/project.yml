name: Slide
options:
  bundleIdPrefix: app.slide
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    # Swift 5 language mode under the Swift 6.3 toolchain. The app keeps a few
    # deliberate shared singletons (CallKitManager, the WebRTC
    # RTCPeerConnectionFactory) that Swift 6 strict language mode rejects
    # outright; Swift 5 mode keeps those as warnings while still compiling with
    # the modern toolchain.
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

# WebRTC integration.
# The stasel/WebRTC package vends the GoogleWebRTC binary. It is wired in here so
# the real RTCPeerConnection implementation (RealCallService) compiles and links.
# That file is also guarded by `#if canImport(WebRTC)` so the app still builds
# with the mock if the package is ever unavailable.
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    minVersion: "120.0.0"
    maxVersion: "200.0.0"

targets:
  Slide:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
    # Let Xcode generate the Info.plist from build settings so it injects the
    # platform/SDK keys installd requires (CFBundleSupportedPlatforms,
    # MinimumOSVersion, DTPlatformName, UIDeviceFamily). A hand-written plist
    # that omits them produces a bundle the simulator refuses to install
    # ("Missing bundle ID"). Custom keys are supplied via INFOPLIST_KEY_* below.
    # Note: UIBackgroundModes (audio/voip/remote-notification) is declared via
    # INFOPLIST_KEY_UIBackgroundModes and is only exercised once VoIP push is
    # enabled, which itself requires a paid Apple Developer account (see README).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.exla.slide
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Slide
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Slide needs camera access for video calls."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Slide needs microphone access for calls."
        INFOPLIST_KEY_NSContactsUsageDescription: "Slide uses your contacts to find friends already on Slide."
        INFOPLIST_KEY_UIBackgroundModes: "audio voip remote-notification"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    dependencies:
      - package: WebRTC
        product: WebRTC

schemes:
  Slide:
    build:
      targets:
        Slide: all
    run:
      config: Debug
    archive:
      config: Release
