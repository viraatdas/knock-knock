# Fly.io config for the Slide SFU (media + signaling).
#   fly deploy -c deploy/fly/slide-sfu.fly.toml
#
# Signaling WS over HTTPS (9000). Media: all WebRTC ICE is muxed onto ONE UDP
# port (SFU_UDP_PORT) exposed on a DEDICATED IPv4, advertised as a 1:1-NAT host
# candidate via SFU_PUBLIC_IP — so clients connect to the SFU directly instead
# of relaying through TURN. Single port keeps Fly UDP forwarding simple.
# Requires: fly ips allocate-v4 -a slide-sfu  (UDP needs a dedicated v4) and a
# SINGLE machine (rooms are per-node in-memory).

app = "slide-sfu"
primary_region = "iad"

[build]
  dockerfile = "../../Dockerfile"
  [build.args]
    BIN = "slide-sfu"

[env]
  SFU_BIND = "0.0.0.0:9000"
  SFU_NODE_ID = "sfu-fly-iad-1"
  # No SFU_PUBLIC_IP: Fly's UDP proxy rewrites source addrs and breaks WebRTC
  # ICE on direct host candidates. The SFU relays media via coturn on EC2
  # instead (TURN_URIS secret → 67.202.5.145), which has real public UDP.
  RUST_LOG = "info,slide_sfu=info"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"

# WebRTC media — single muxed UDP port on the dedicated IPv4.
[[services]]
  protocol = "udp"
  internal_port = 40000
  [[services.ports]]
    port = 40000

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
