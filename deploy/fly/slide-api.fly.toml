# Fly.io config for slide-api (REST + the app-signaling WebSocket).
#   fly deploy -c deploy/fly/slide-api.fly.toml
#
# WHY FLY: AWS App Runner's Envoy ingress returns 403 on WebSocket upgrades, so
# the /v1/ws signaling socket (call ring + presence) can never connect there —
# every call dies because the callee never receives `incoming_call`. Fly serves
# WebSockets, so the API lives here for calling to work. The hub
# (crates/slide-api/src/hub.rs) is in-memory, so keep a SINGLE instance
# (min=max=1). Same RDS as the old App Runner image; Redis is bundled in the
# image (REDIS_URL defaults to localhost). Secrets set via `fly secrets set`.

app = "slide-api"
primary_region = "iad"

[build]
  # Build from source (all-in-one image bundles Redis; DATABASE_URL secret points
  # at the managed Postgres). Was a prebuilt ECR image; now built on every deploy
  # so backend changes (e.g. LiveKit token minting) actually ship.
  dockerfile = "../aws/Dockerfile.allinone"

[env]
  API_BIND = "0.0.0.0:8080"
  EXPOSE_DEV_OTP = "true"
  FIREBASE_PROJECT_ID = "slide-b4c50"
  # SFU on a Hetzner VPS (public IP directly on the NIC) behind Caddy TLS via
  # sslip.io. The SFU code is verified (real browsers, bidirectional video).
  SFU_PUBLIC_URL = "wss://178-156-247-146.sslip.io"
  SMS_PROVIDER = "console"
  # coturn on the same box (TURN fallback). NOTE: same-box relay hairpins for
  # clients that REQUIRE TURN (symmetric NAT); move coturn to its own IP if so.
  TURN_URIS = "turn:178.156.247.146:3478?transport=udp,turn:178.156.247.146:3478?transport=tcp"
  VAPID_SUBJECT = "mailto:viraat@exla.ai"
  RUST_LOG = "info,slide_api=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/v1/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "25s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
