<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Knock Knock">
  <rect width="64" height="64" rx="14" fill="#FAF6EF"/>
  <!-- door -->
  <rect x="38" y="14" width="18" height="38" rx="2.5" fill="#7A5A3E"/>
  <circle cx="41" cy="33" r="1.6" fill="#D4694F"/>
  <!-- knock arc -->
  <path d="M33 28 a5 5 0 0 1 0 10" fill="none" stroke="#D4694F" stroke-width="1.6" stroke-linecap="round"/>
  <!-- stick figure -->
  <g fill="none" stroke="#2A211B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="20" r="4.5" fill="#2A211B" stroke="none"/>
    <line x1="20" y1="24.5" x2="19" y2="40"/>
    <line x1="19" y1="40" x2="14" y2="50"/>
    <line x1="19" y1="40" x2="25" y2="50"/>
    <line x1="20" y1="29" x2="13" y2="37"/>
    <line x1="20" y1="29" x2="31" y2="25"/>
  </g>
</svg>
