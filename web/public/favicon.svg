<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="Slide">
  <rect width="180" height="180" rx="40" fill="#FFFFFF"/>
  <!-- motion streaks -->
  <g stroke="#2F6FF0" stroke-width="5.5" stroke-linecap="round">
    <line x1="20" y1="78" x2="48" y2="78"/>
    <line x1="24" y1="90" x2="56" y2="90"/>
    <line x1="20" y1="102" x2="48" y2="102"/>
  </g>
  <!-- sliding figure -->
  <g fill="none" stroke="#16181D" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="92" cy="56" r="13" fill="#16181D" stroke="none"/>
    <line x1="93" y1="69" x2="104" y2="108"/>
    <polyline points="104,108 128,112 144,130"/>
    <line x1="104" y1="108" x2="74" y2="134"/>
    <line x1="97" y1="80" x2="130" y2="70"/>
    <line x1="97" y1="80" x2="64" y2="92"/>
  </g>
</svg>
