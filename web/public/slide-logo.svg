<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="Knock Knock">
  <rect width="180" height="180" rx="40" fill="#FAF6EF"/>
  <rect x="0.5" y="0.5" width="179" height="179" rx="39.5" fill="none" stroke="#E6DCCB"/>
  <!-- door -->
  <rect x="104" y="40" width="52" height="112" rx="6" fill="#7A5A3E"/>
  <rect x="110" y="48" width="40" height="96" rx="4" fill="none" stroke="#5A4632" stroke-width="2.5"/>
  <circle cx="113" cy="96" r="3.5" fill="#D4694F"/>
  <!-- knock arcs -->
  <g fill="none" stroke="#D4694F" stroke-width="3" stroke-linecap="round">
    <path d="M92 84 a10 10 0 0 1 0 20"/>
    <path d="M98 80 a16 16 0 0 1 0 28"/>
  </g>
  <!-- stick figure knocking -->
  <g fill="none" stroke="#2A211B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="58" cy="58" r="12" fill="#2A211B" stroke="none"/>
    <line x1="58" y1="70" x2="56" y2="112"/>
    <line x1="56" y1="112" x2="44" y2="140"/>
    <line x1="56" y1="112" x2="70" y2="140"/>
    <line x1="58" y1="80" x2="42" y2="104"/>
    <line x1="58" y1="80" x2="88" y2="68"/>
  </g>
</svg>
