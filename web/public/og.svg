      <line x1="93" y1="69" x2="104" y2="108"/>
      <polyline points="104,108 128,112 144,130"/>
      <line x1="104" y1="108" x2="74" y2="134"/>
      <line x1="97" y1="80" x2="130" y2="70"/>
